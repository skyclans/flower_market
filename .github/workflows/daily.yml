name: daily-auction-etl

# 매일 한국시간 20:00 (UTC 11:00) — 당일 경매 마감 후 수집
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}        # 수동 실행 허용

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE: ${{ vars.SOURCE || 'excel' }}
          MARKETS: ${{ vars.MARKETS || '0000000001' }}
          LAST_N: ${{ vars.LAST_N || '1' }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          OPENAPI_ENDPOINT: ${{ vars.OPENAPI_ENDPOINT }}
          OPENAPI_MARKET_CODES: ${{ vars.OPENAPI_MARKET_CODES }}
        run: python etl/run_daily.py

# 설정 방법:
#   Settings → Secrets and variables → Actions
#     Secrets: DATABASE_URL, (openapi 시) DATA_GO_KR_SERVICE_KEY
#     Variables: SOURCE, MARKETS, LAST_N, (openapi 시) OPENAPI_ENDPOINT, OPENAPI_MARKET_CODES
